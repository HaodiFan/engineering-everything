# Machine-readable route seeds. The agent still makes the final engineering judgment.
routes:
  - id: product
    aliases: ["/spec", "/define", "/prd"]
    signals: ["想法", "需求", "PRD", "做个系统", "用户场景"]
    fuzzy_examples:
      - "我有个想法，先帮我判断怎么定义需求"
    stages: ["0", "1", "2"]
    references:
      - references/stage-playbook.md
      - references/checklists.md
      - references/spec-templates.md
  - id: architecture
    aliases: ["/arch", "/scaffold", "/new-project"]
    signals: ["技术栈", "架构", "选型", "从 0 搭", "starter"]
    fuzzy_examples:
      - "我要从 0 搭一个项目，技术栈怎么选"
    stages: ["3", "4"]
    references:
      - references/architecture-cases.md
      - references/project-blueprints.md
  - id: inherit
    aliases: ["/handover", "/audit", "/inherit"]
    signals: ["接手", "老项目", "现有项目", "继续迭代"]
    fuzzy_examples:
      - "我接手了一个旧项目，先帮我看怎么继续"
    stages: ["I"]
    references:
      - references/inheriting-projects.md
  - id: execution-plan
    aliases: ["/plan", "/split"]
    signals: ["怎么拆", "implementation plan", "feature 规划"]
    fuzzy_examples:
      - "这个功能怎么拆成可执行计划"
    stages: ["5"]
    references:
      - references/execution-pipeline.md
      - references/checklists.md
  - id: build
    aliases: ["/build", "/fix", "/migrate"]
    signals: ["实现", "修 bug", "迁移", "写代码", "接接口"]
    fuzzy_examples:
      - "帮我实现这个功能并跑验证"
    stages: ["6"]
    references:
      - references/stage-playbook.md
      - references/execution-pipeline.md
      - references/agent-operating-standards.md
  - id: refactor
    aliases: ["/refactor", "/cleanup", "/modularize"]
    signals: ["重构", "清理", "模块化", "重命名", "技术债", "refactor", "cleanup"]
    fuzzy_examples:
      - "这个模块太乱，帮我按行为保持方式重构"
    stages: ["9"]
    references:
      - references/stage-playbook.md
      - references/refactoring-rules.md
      - references/checklists.md
      - references/execution-pipeline.md
  - id: review-release
    aliases: ["/test", "/review", "/ship", "/release"]
    signals: ["review", "PR", "merge", "release", "发布"]
    fuzzy_examples:
      - "review 这个 PR，判断能不能 merge"
    stages: ["7", "8"]
    references:
      - references/code-review-standards.md
      - references/checklists.md
      - references/execution-pipeline.md
  - id: learn
    aliases: ["/learn", "/lesson", "/pattern"]
    signals: ["记住", "纠偏", "不对", "以后都这样"]
    fuzzy_examples:
      - "这个纠偏记住，以后都按这个判断"
    stages: ["8", "9"]
    references:
      - references/lessons.md
      - references/patterns-skill.md
  - id: talent
    aliases: ["/interview", "/hire", "/scorecard"]
    signals: ["面试", "候选人", "招聘", "JD", "评分卡", "debrief"]
    fuzzy_examples:
      - "我要面试一个后端工程师，帮我设计流程和评分卡"
    stages: ["I", "0", "1", "7"]
    references:
      - references/engineering-scenarios.md
  - id: onboarding
    aliases: ["/onboard", "/training", "/bootcamp"]
    signals: ["入职", "培训", "企业介绍", "协同机制", "开发机制", "新人"]
    fuzzy_examples:
      - "给新人做入职培训和工程化培训"
    stages: ["0", "1", "6", "7", "8"]
    references:
      - references/engineering-scenarios.md
      - references/templates-core.md
  - id: organization-system
    aliases: ["/org", "/company", "/sop"]
    signals: ["构建组织", "构建企业", "组织机制", "企业机制", "SOP", "流程", "制度", "协同机制"]
    fuzzy_examples:
      - "我要搭一个组织/企业/SOP，按工程方式拆机制和落地路径"
    stages: ["0", "1", "2", "5", "7", "8"]
    references:
      - references/engineering-scenarios.md
      - references/templates-core.md
      - references/checklists.md
  - id: project-ops
    aliases: ["/estimate", "/wbs", "/project"]
    signals: ["非工程项目", "方案", "排期", "人天", "成本估算", "WBS"]
    fuzzy_examples:
      - "帮我把这个非工程项目拆方案、排期、人天和成本"
    stages: ["0", "1", "2", "5", "7", "8"]
    references:
      - references/engineering-scenarios.md
  - id: non-software-development
    aliases: ["/artifact", "/nonsoftware", "/workspace"]
    signals: ["文件输出", "Skill 开发", "多维表", "知识库", "目标产出物"]
    fuzzy_examples:
      - "我要做一个多维表/文件输出/Skill 开发项目，按工程方式组织"
    stages: ["0", "1", "2", "3", "4", "5", "7"]
    references:
      - references/engineering-scenarios.md
      - references/spec-templates.md
